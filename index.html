<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Sistem Informasi WebAR Mobil - Interaktif</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <!-- Memanggil A-Frame untuk visual 3D -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <!-- Memanggil AR.js untuk fitur Augmented Reality (Kamera & Deteksi Lantai) -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    
    <!-- Menginisiasi sistem AR menggunakan kamera belakang HP -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- Tempat Manajemen/Load Aset 3D secara Online -->
      <a-assets>
        <!-- Mengambil aset model 3D Mobil Resmi dari Github Khronos Group -->
        <a-asset-item id="mobil-3d" src="https://raw.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/ToyCar/glTF-Embedded/ToyCar.gltf"></a-asset-item>
      </a-assets>

      <!-- Menggunakan Marker Hiro sebagai jangkar di lantai -->
      <a-marker preset="hiro">
        
        <!-- Menampilkan Model 3D Mobil -->
        <!-- scale="15 15 15" disesuaikan agar ukuran mobil terlihat ideal di atas kertas -->
        <a-entity gltf-model="#mobil-3d" 
                  position="0 0 0" 
                  scale="15 15 15" 
                  rotation="0 0 0"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
        </a-entity>

        <!-- Teks Informasi Melayang di Atas Mobil -->
        <a-text value="MODEL 3D MOBIL INTERAKTIF" 
                position="0 1.2 0" 
                color="#3498db" 
                align="center" 
                width="4"
                side="double">
        </a-text>

      </a-marker>

      <!-- Kamera Pengguna -->
      <a-entity camera></a-entity>

    </a-scene>
  </body>
</html>
