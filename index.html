<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <title>Sistem Informasi WebAR - Ega</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
    <style>
      body { 
        margin: 0; 
        padding: 0; 
        overflow: hidden; 
        background-color: #121212; 
        font-family: Arial, sans-serif;
      }
      
      model-viewer {
        width: 100vw;
        height: 100vh;
      }
      
      /* Tombol Biru di bawah Objek 3D */
      #ar-button {
        background-color: #2980b9;
        border-radius: 8px;
        border: none;
        position: absolute;
        bottom: 100px; 
        left: 50%;
        transform: translateX(-50%);
        color: white;
        padding: 14px 28px;
        font-size: 16px;
        font-weight: bold;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        cursor: pointer;
        z-index: 999;
      }

      .instruksi {
        position: absolute;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 10px 20px;
        border-radius: 20px;
        font-size: 14px;
        text-align: center;
        pointer-events: none;
        width: 80%;
        max-width: 300px;
      }
    </style>
  </head>
  <body>

    <div class="instruksi">
      <b>LIHAT OBJEK 3D</b><br>Geser layar untuk memutar astronot
    </div>

    <model-viewer 
      src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
      ar
      ar-modes="scene-viewer quick-look"
      camera-controls
      touch-action="none"
      shadow-intensity="1"
      auto-rotate>
      
      <button slot="ar-button" id="ar-button">
        TAMPILKAN DI LANTAI
      </button>
      
    </model-viewer>

  </body>
</html>
