<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <title>Sistem Informasi WebAR Tanpa Marker - Ega</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
    <style>
      body { margin: 0; padding: 0; overflow: hidden; background-color: #000; }
      
      model-viewer {
        width: 100vw;
        height: 90vh; /* Dikurangi biar gak kemakan layar bawah HP */
      }
      
      /* Tombol AR dinaikkan posisinya dan diperjelas */
      #ar-button {
        background-color: #2980b9;
        border-radius: 8px;
        border: none;
        position: absolute;
        bottom: 80px; /* Posisi dinaikkan biar gak kepotong navigasi HP */
        left: 50%;
        transform: translateX(-50%);
        color: white;
        padding: 14px 28px;
        font-family: Arial, sans-serif;
        font-size: 16px;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        cursor: pointer;
        z-index: 999; /* Memastikan tombol paling depan */
      }
    </style>
  </head>
  <body>

    <model-viewer 
      src="https://raw.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/ToyCar/glTF-Embedded/ToyCar.gltf"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      touch-action="none"
      shadow-intensity="1"
      auto-rotate>
      
      <button slot="ar-button" id="ar-button">
        TAMPILKAN MOBIL DI LANTAI
      </button>
      
    </model-viewer>

  </body>
</html>
