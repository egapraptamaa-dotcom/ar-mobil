<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>Sistem Informasi WebAR - Ega</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #info-text {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 12px 24px;
            font-family: Arial, sans-serif; border-radius: 20px; z-index: 999; 
            text-align: center; font-size: 14px; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="info-text">AR TANPA MARKER AKTIF<br>Objek otomatis muncul di depan kamera</div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <a-asset-item id="astronaut" src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"></a-asset-item>
        </a-assets>

        <a-entity 
            gltf-model="#astronaut" 
            position="0 -0.5 -2" 
            scale="0.4 0.4 0.4"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 12000">
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>

</body>
</html>
